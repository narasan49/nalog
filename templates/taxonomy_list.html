{% extends "base.html" %}

{% block title %}タグ一覧 | {{ config.title }}{% endblock title %}

{% block content %}
<h1>タグ一覧</h1>
<ul class="post-tags" style="margin-top: 1.5rem; list-style: none;">
  {% for term in terms %}
  <li style="display: inline-block; margin: 0.25rem;">
    <a href="{{ term.permalink }}" class="tag" style="font-size: 0.9375rem;">
      {{ term.name }} ({{ term.pages | length }})
    </a>
  </li>
  {% endfor %}
</ul>
{% endblock content %}
