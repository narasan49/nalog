name: Upload WASM to R2

on:
  push:
    branches:
      - main
    paths:
      - 'wasm/**'
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install rclone
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash

      - name: Configure rclone for Cloudflare R2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${R2_ACCESS_KEY_ID}
          secret_access_key = ${R2_SECRET_ACCESS_KEY}
          endpoint = https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com
          acl = private
          EOF

      - name: Upload all demos to R2
        env:
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          shopt -s nullglob
          DEMOS=(wasm/*/)
          if [ ${#DEMOS[@]} -eq 0 ]; then
            echo "Warning: wasm/ にデモディレクトリが見つかりません。" >&2
            exit 1
          fi

          for demo in wasm/*/; do
            demo_name=$(basename "$demo")
            echo "Uploading ${demo} -> r2:${R2_BUCKET_NAME}/${demo_name}/"
            rclone sync "$demo" "r2:${R2_BUCKET_NAME}/${demo_name}/" --progress
          done
